name: ci

on:
  push:
    branches: [ "main" ]


jobs:
  tests:
    name: CI
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.0"

      - name: Install Fyne dependencies
        run: sudo apt-get update && sudo apt-get install -y libgl1-mesa-dev xorg-dev libxkbcommon-dev

      - name: Install staticcheck
        run: go install honnef.co/go/tools/cmd/staticcheck@latest

      - name: Formatting
        run: test -z "$(go fmt ./...)"

      - name: Linting
        run: staticcheck ./...

      - name: Code Test
        run: ./testing.sh total

